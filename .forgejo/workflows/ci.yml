name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: 'PHP Tests (FreeBSD)'
    runs-on: FreeBSD

    steps:
      - name: Checkout
        run: |
          rm -rf opnsense-mcp
          git clone --depth 1 --branch ${{ github.ref_name }} ${{ github.server_url }}/${{ github.repository }}.git opnsense-mcp

      - name: Install PHP dependencies
        run: |
          # Detect PHP version prefix (e.g. "php83")
          PHP_PKG=$(pkg query -x '%n' '^php[0-9]+-[0-9]' 2>/dev/null | head -1 | sed 's/-[0-9].*//')
          if [ -z "$PHP_PKG" ]; then
            PHP_PKG="php83"
          fi
          echo "PHP package prefix: ${PHP_PKG}"

          NEEDED=""
          for ext in curl dom mbstring tokenizer xml xmlwriter; do
            if ! pkg info -e "${PHP_PKG}-${ext}" 2>/dev/null; then
              NEEDED="${NEEDED} ${PHP_PKG}-${ext}"
            fi
          done

          # PHPUnit from system packages (package name includes PHP version suffix)
          PHPUNIT_PKG="phpunit11-${PHP_PKG}"
          if ! pkg info -e "${PHPUNIT_PKG}" 2>/dev/null; then
            NEEDED="${NEEDED} ${PHPUNIT_PKG}"
          fi

          if [ -n "$NEEDED" ]; then
            echo "Installing:${NEEDED}"
            doas pkg install -y ${NEEDED}
            for ini in /usr/local/etc/php/ext-*.ini.sample; do
              target="${ini%.sample}"
              [ ! -f "$target" ] && doas cp "$ini" "$target"
            done
          else
            echo "All dependencies already installed"
          fi

          php -v
          phpunit --version

      - name: PHP syntax check
        run: find opnsense-mcp/classes opnsense-mcp/tools opnsense-mcp/bin opnsense-mcp/system opnsense-mcp/libraries -name "*.php" | xargs -n1 php -l

      - name: Run tests
        run: cd opnsense-mcp && phpunit --colors=always
