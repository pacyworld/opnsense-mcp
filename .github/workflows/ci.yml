name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: 'PHP ${{ matrix.php-version }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, dom, mbstring, xml, tokenizer
          tools: phpunit:11

      - name: PHP syntax check
        run: find classes tools bin system libraries -name "*.php" | xargs -n1 php -l

      - name: Run tests
        run: phpunit --colors=always
